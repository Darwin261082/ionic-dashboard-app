<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Dashboard</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
 <ion-card *ngIf="error" color="danger">
    <ion-card-content>
      Ocurrió un error al cargar la información.
    </ion-card-content>
  </ion-card>

  <!--  Estadísticas -->
  <ion-grid *ngIf="!error">
    <ion-row>
      <ion-col size="12" size-md="6">
        <app-stat-card
          title="Total Usuarios"
          [value]="users.length"
          icon="people-outline">
        </app-stat-card>
      </ion-col>

      <ion-col size="12" size-md="6">
        <app-stat-card
          title="Total Productos"
          [value]="products.length"
          icon="cube-outline">
        </app-stat-card>
      </ion-col>
    </ion-row>
  </ion-grid>

  <!--  Últimos Usuarios -->
  <ion-card class="recent-card" *ngIf="!error">
    <ion-card-header>
      <ion-card-title>Últimos Usuarios</ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <app-recent-list
        [items]="users.slice(0,5)"
        field="name">
      </app-recent-list>
    </ion-card-content>
  </ion-card>

</ion-content>
